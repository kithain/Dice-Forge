<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Forge — Lanceur de Dés JDR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.min.js",
  "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
} }
</script>
</head>
<body>
<div class="stars"></div>
<div class="wrap">

<header>
  <span class="rune">⚔️</span>
  <h1>Dice Forge</h1>
  <p class="subtitle">Lanceur de Dés pour Jeux de Rôle</p>
  <div class="hdiv"><span class="hdiv-icon">✦</span></div>
</header>

<div class="settings">
  <div class="tog-wrap" onclick="toggleSetting('anim')">
    <div class="tog on" id="tog-anim"></div>
    <span class="tog-lbl">Animations</span>
  </div>
  <div class="tog-wrap" onclick="toggleSetting('sound')">
    <div class="tog on" id="tog-sound"></div>
    <span class="tog-lbl">Son MP3</span>
  </div>
  <div class="tog-wrap" onclick="toggleSetting('hide')">
    <div class="tog" id="tog-hide"></div>
    <span class="tog-lbl">🎭 Cacher mes jets (MJ)</span>
  </div>
</div>

<div class="room-panel" id="room-panel">
  <div id="room-join">
    <div class="room-row">
      <div class="room-field">
        <label>Nom du joueur</label>
        <input class="room-input wide" id="player-name" placeholder="Nom..." maxlength="20" onfocus="if(!this.value)this.placeholder=randomFantasyName()">
      </div>
      <div class="room-field">
        <label>Code de la partie</label>
        <input class="room-input" id="room-code" placeholder="ABCD" maxlength="6" style="text-transform:uppercase">
      </div>
      <button class="room-btn" id="join-btn" onclick="joinRoom()">Rejoindre</button>
      <button class="room-btn" id="create-btn" onclick="createRoom()" style="background:var(--goldd)">Créer</button>
    </div>
  </div>
  <div id="room-connected" style="display:none">
    <div class="room-status">
      <span class="room-badge" id="room-badge-text">Room: —</span>
      <span class="room-badge" id="player-badge-text">Joueur: —</span>
      <button class="room-leave" id="purge-btn" onclick="purgeRoom()" style="display:none">Purger</button>
      <button class="room-leave" onclick="leaveRoom()">Quitter</button>
    </div>
  </div>
</div>

<div class="quick-wrap">
  <div class="slabel">Lancer rapide</div>
  <div class="quick-row" id="quick-row">
    <button class="qbtn feat" onclick="quickRoll(20)">🎲 D20</button>
    <button class="qbtn feat" onclick="quickRoll(6)">🎲 D6</button>
    <button class="qbtn feat" onclick="quickRoll(100)">🎲 D100</button>
    <button class="qbtn" onclick="quickRoll(4)">D4</button>
    <button class="qbtn" onclick="quickRoll(8)">D8</button>
    <button class="qbtn" onclick="quickRoll(10)">D10</button>
    <button class="qbtn" onclick="quickRoll(12)">D12</button>
    <button class="qbtn" onclick="quickMulti([{t:6,n:3}])">3D6</button>
    <button class="qbtn" onclick="quickMulti([{t:20,n:1},{t:6,n:2}])">1D20 + 2D6</button>
    <button class="qbtn" onclick="quickMulti([{t:8,n:2}])">2D8</button>
  </div>
</div>

<div class="builder">
  <div class="slabel">Composer votre jet</div>
  <div class="dgrid" id="dgrid"></div>
  <div class="exbar" id="exbar">
    <span class="exempty">Sélectionnez des dés ci-dessus…</span>
  </div>
  <div class="mod-row">
    <span class="mod-lbl">Modificateur</span>
    <input class="mod-input" id="mod-input" type="number" value="0" min="-99" max="99" step="1" onchange="renderExBar()">
    <span class="mod-tip">ex. +5 (Force), −2 (malus)</span>
  </div>
</div>

<div class="roll-area">
  <button class="roll-btn" id="roll-btn" onclick="rollAll()" disabled>⚔️ &nbsp; Lancer les Dés</button>
</div>

<div class="dice-stage">
  <div class="dice-3d-container" id="dice-3d-container"><canvas id="dice-3d-canvas"></canvas></div>
  <div class="result-area" id="result-area"></div>
</div>

<div class="live-feed" id="live-feed" style="display:none">
  <div class="live-title">Jets en direct</div>
  <div id="live-list"></div>
</div>

</div>

<audio id="roll-sfx" preload="auto" src="audio/dice.mp3"></audio>

<script src="supabase-config.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
