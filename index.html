<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Forge — Lanceur de Dés JDR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07071a;
  --s1: #0d0d28;
  --s2: #13133a;
  --gold: #c9a227;
  --gold2: #e8c85a;
  --goldd: #6a5510;
  --purp: #6d28d9;
  --purp2: #a855f7;
  --red: #dc2626;
  --yel: #fbbf24;
  --txt: #ede0c8;
  --txd: #8a7a6a;
  --txm: #3a3025;
  --brd: #1a1a3f;
  --brd2: #2a2a55;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 80% 40% at 50% 0%,rgba(109,40,217,.18) 0%,transparent 70%),
    radial-gradient(ellipse 60% 30% at 10% 100%,rgba(201,162,39,.08) 0%,transparent 60%),
    radial-gradient(ellipse 60% 30% at 90% 80%,rgba(109,40,217,.07) 0%,transparent 60%);
  color:var(--txt);
  font-family:Georgia,'Times New Roman',serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ——— stars ——— */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.stars::before,.stars::after{content:'';position:absolute;inset:0}
.stars::before{
  background-image:
    radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.45),transparent),
    radial-gradient(1px 1px at 22% 48%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 36% 7%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 51% 63%,rgba(255,255,255,.25),transparent),
    radial-gradient(1px 1px at 64% 22%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 78% 54%,rgba(255,255,255,.35),transparent),
    radial-gradient(1px 1px at 91% 11%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 14% 79%,rgba(255,255,255,.25),transparent),
    radial-gradient(1px 1px at 44% 91%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 83% 34%,rgba(255,255,255,.4),transparent),
    radial-gradient(1.5px 1.5px at 29% 61%,rgba(255,255,255,.3),transparent),
    radial-gradient(1.5px 1.5px at 71% 82%,rgba(255,255,255,.2),transparent),
    radial-gradient(1px 1px at 55% 38%,rgba(255,255,255,.35),transparent),
    radial-gradient(1px 1px at 4% 55%,rgba(255,255,255,.25),transparent),
    radial-gradient(1px 1px at 95% 68%,rgba(255,255,255,.3),transparent);
}
.stars::after{
  background-image:
    radial-gradient(2px 2px at 17% 28%,rgba(201,162,39,.4),transparent),
    radial-gradient(2px 2px at 74% 16%,rgba(201,162,39,.35),transparent),
    radial-gradient(2px 2px at 43% 74%,rgba(168,85,247,.35),transparent),
    radial-gradient(2px 2px at 88% 43%,rgba(201,162,39,.3),transparent),
    radial-gradient(1.5px 1.5px at 6% 86%,rgba(168,85,247,.3),transparent),
    radial-gradient(1px 1px at 62% 5%,rgba(255,255,255,.45),transparent),
    radial-gradient(1px 1px at 33% 19%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 86% 75%,rgba(255,255,255,.25),transparent);
}

/* ——— layout ——— */
.wrap{max-width:960px;margin:0 auto;padding:0 1.25rem 5rem;position:relative;z-index:1}

/* ——— header ——— */
header{text-align:center;padding:2.5rem 0 2rem}
.rune{display:block;font-size:2.2rem;margin-bottom:.4rem;animation:float 3.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h1{
  font-family:'Cinzel Decorative','Cinzel',serif;
  font-size:clamp(1.8rem,5vw,3.2rem);font-weight:700;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 50%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:.4rem;
}
.subtitle{font-family:'Cinzel',serif;font-size:.8rem;color:var(--txd);letter-spacing:.3em;text-transform:uppercase}
.hdiv{display:flex;align-items:center;gap:.8rem;margin:1.2rem auto 0;max-width:360px}
.hdiv::before,.hdiv::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--goldd))}
.hdiv::after{background:linear-gradient(270deg,transparent,var(--goldd))}
.hdiv-icon{color:var(--gold);font-size:1.1rem}

/* ——— section label ——— */
.slabel{
  font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--txd);margin-bottom:.65rem;display:flex;align-items:center;gap:.65rem;
}
.slabel::after{content:'';flex:1;height:1px;background:var(--brd2)}

/* ——— settings ——— */
.settings{display:flex;gap:1.25rem;margin-bottom:1.25rem;flex-wrap:wrap}
.tog-wrap{display:flex;align-items:center;gap:.5rem;cursor:pointer;user-select:none}
.tog{position:relative;width:34px;height:18px;background:var(--brd2);border-radius:9px;transition:background .2s}
.tog.on{background:var(--purp)}
.tog::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:19px}
.tog-lbl{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;color:var(--txd);text-transform:uppercase}

/* ——— quick buttons ——— */
.quick-wrap{margin-bottom:1.25rem}
.quick-row{display:flex;gap:.4rem;flex-wrap:wrap}
.qbtn{
  border:1px solid var(--brd2);background:var(--s1);color:var(--txt);
  font-family:'Cinzel',serif;font-size:.78rem;padding:.45rem .85rem;
  cursor:pointer;border-radius:4px;transition:all .18s;
}
.qbtn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,162,39,.07)}
.qbtn.feat{border-color:var(--goldd);background:rgba(201,162,39,.05)}
.qbtn:disabled{opacity:.45;cursor:not-allowed}

/* ——— builder ——— */
.builder{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:1.1rem;margin-bottom:1.25rem}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:.5rem;margin-bottom:.9rem}
.dsel{
  border:1px solid var(--brd2);border-radius:6px;background:var(--s2);
  padding:.55rem .4rem;text-align:center;cursor:pointer;transition:all .18s;
}
.dsel:hover{border-color:var(--purp2)}
.dsel.active{border-color:var(--gold);background:rgba(201,162,39,.07)}
.dsel svg{display:block;margin:0 auto .25rem}
.dname{font-family:'Cinzel',serif;font-size:.72rem;font-weight:600;color:var(--gold);letter-spacing:.08em}
.dcount{display:flex;align-items:center;justify-content:center;gap:.35rem;margin-top:.35rem}
.cbtn{
  width:20px;height:20px;border:1px solid var(--brd2);background:var(--s1);
  color:var(--txt);border-radius:3px;cursor:pointer;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.cbtn:hover{border-color:var(--gold);color:var(--gold)}
.cval{font-family:'Cinzel',serif;font-size:.85rem;min-width:1.1em;text-align:center}

/* ——— expression bar ——— */
.exbar{
  display:flex;align-items:center;gap:.55rem;padding:.65rem .85rem;
  background:var(--s2);border:1px solid var(--brd2);border-radius:6px;
  min-height:48px;flex-wrap:wrap;
}
.extok{
  font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);
  background:rgba(201,162,39,.1);border:1px solid rgba(201,162,39,.28);
  padding:.2rem .55rem;border-radius:4px;
}
.explus{color:var(--txd);font-size:1rem}
.exempty{color:var(--txm);font-style:italic;font-size:.88rem}
.exclear{
  margin-left:auto;background:none;border:1px solid var(--brd2);
  color:var(--txd);padding:.18rem .55rem;border-radius:3px;cursor:pointer;
  font-size:.72rem;transition:all .18s;
}
.exclear:hover{border-color:var(--red);color:var(--red)}

/* modifier input */
.mod-row{display:flex;align-items:center;gap:.65rem;margin-top:.75rem;flex-wrap:wrap}
.mod-lbl{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;color:var(--txd);text-transform:uppercase}
.mod-input{
  width:70px;background:var(--s2);border:1px solid var(--brd2);border-radius:4px;
  color:var(--txt);font-family:'Cinzel',serif;font-size:.85rem;padding:.3rem .5rem;
  text-align:center;outline:none;
}
.mod-input:focus{border-color:var(--gold)}
.mod-tip{font-size:.75rem;color:var(--txm);font-style:italic}

/* ——— roll button ——— */
.roll-area{text-align:center;margin:1.75rem 0}
.roll-btn{
  position:relative;font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;padding:.9rem 2.8rem;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  border:1px solid rgba(168,85,247,.45);border-radius:6px;
  color:#fff;cursor:pointer;transition:all .2s;overflow:hidden;
}
.roll-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 60%);opacity:0;transition:opacity .2s}
.roll-btn:hover::before{opacity:1}
.roll-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(109,40,217,.45)}
.roll-btn:active{transform:translateY(0)}
.roll-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.roll-btn.rolling{animation:rpulse .5s ease-in-out infinite}
@keyframes rpulse{0%,100%{box-shadow:0 0 16px rgba(109,40,217,.35)}50%{box-shadow:0 0 36px rgba(168,85,247,.75)}}

/* ——— result area ——— */
.result-area{margin-bottom:1.75rem}
.dice-display{display:flex;flex-wrap:wrap;gap:.9rem;justify-content:center;min-height:110px;align-items:center;margin-bottom:1.25rem;perspective:800px}
.dgroup{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;justify-content:center}
.gplus{font-size:1.4rem;color:var(--txd);margin:0 .2rem}
.die-item{display:flex;flex-direction:column;align-items:center;gap:.3rem}
.dsvg-wrap{width:78px;height:78px;display:flex;align-items:center;justify-content:center;position:relative;perspective:200px}
.dsvg-wrap svg{width:78px;height:78px;transition:filter .3s}

/* rolling — 3D tumble (WAAPI driven on .die-3d) */
.dsvg-wrap.rolling::before{content:'';position:absolute;inset:-14px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.28),transparent 70%);pointer-events:none;animation:glowPulse .6s ease-in-out infinite alternate;z-index:0}
@keyframes glowPulse{0%{opacity:.4;transform:scale(.85)}100%{opacity:.9;transform:scale(1.15)}}
.die-3d{position:relative;width:100%;height:100%;transform-style:preserve-3d}
.die-face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.die-face.die-back{transform:rotateY(180deg)}
.dsvg-wrap.rolling .die-face svg{filter:blur(1.5px)}

/* settle — multi-step bounce */
.dsvg-wrap.s-norm svg{animation:sbounce2 .55s cubic-bezier(.36,.07,.19,.97) forwards;filter:drop-shadow(0 0 5px rgba(201,162,39,.35));animation-delay:var(--d,0s)}
.dsvg-wrap.s-high svg{animation:sbounce2 .55s cubic-bezier(.36,.07,.19,.97) forwards;filter:drop-shadow(0 0 9px rgba(201,162,39,.65));animation-delay:var(--d,0s)}
.dsvg-wrap.s-low svg{animation:sbounce2 .55s cubic-bezier(.36,.07,.19,.97) forwards;filter:drop-shadow(0 0 7px rgba(220,38,38,.55));animation-delay:var(--d,0s)}
.dsvg-wrap.s-crit svg{animation:scrittle2 .7s ease-out forwards;filter:drop-shadow(0 0 14px rgba(251,191,36,1)) drop-shadow(0 0 28px rgba(201,162,39,.5));animation-delay:var(--d,0s)}
.dsvg-wrap.s-fail svg{animation:sfail .55s ease-out forwards;filter:drop-shadow(0 0 12px rgba(220,38,38,.85));animation-delay:var(--d,0s)}

/* impact ring on settle */
.dsvg-wrap.s-norm::after,.dsvg-wrap.s-high::after,.dsvg-wrap.s-low::after,.dsvg-wrap.s-fail::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(201,162,39,.35);animation:impact .45s ease-out forwards;animation-delay:var(--d,0s);pointer-events:none}
.dsvg-wrap.s-crit::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(251,191,36,.6);animation:critburst .8s ease-out forwards;animation-delay:var(--d,0s);pointer-events:none}
.dsvg-wrap.s-fail::after{border-color:rgba(220,38,38,.5)}

@keyframes sbounce2{
  0%{transform:translateY(-28px) scale(1.25) rotate(8deg);filter:blur(.5px) drop-shadow(0 0 5px rgba(201,162,39,.35))}
  30%{transform:translateY(0) scale(.85) rotate(-3deg)}
  50%{transform:translateY(-10px) scale(1.08) rotate(2deg)}
  70%{transform:translateY(0) scale(.96) rotate(-1deg)}
  85%{transform:translateY(-3px) scale(1.02) rotate(.5deg)}
  100%{transform:translateY(0) scale(1) rotate(0)}
}
@keyframes scrittle2{
  0%{transform:translateY(-38px) scale(1.45) rotate(15deg);filter:blur(1px) drop-shadow(0 0 14px rgba(251,191,36,1))}
  25%{transform:translateY(0) scale(.8) rotate(-8deg)}
  45%{transform:translateY(-14px) scale(1.18) rotate(5deg)}
  65%{transform:translateY(0) scale(.92) rotate(-2deg)}
  80%{transform:translateY(-5px) scale(1.06) rotate(1deg)}
  100%{transform:translateY(0) scale(1) rotate(0)}
}
@keyframes sfail{
  0%{transform:translateY(-18px) scale(1.15) rotate(0)}
  20%{transform:translateY(0) scale(.9) rotate(-5deg)}
  30%{transform:translateX(-8px) rotate(-3deg)}
  45%{transform:translateX(8px) rotate(3deg)}
  60%{transform:translateX(-5px) rotate(-2deg)}
  75%{transform:translateX(3px) rotate(1deg)}
  100%{transform:translateX(0) translateY(0) scale(1) rotate(0)}
}
@keyframes impact{0%{transform:scale(.7);opacity:1}100%{transform:scale(1.8);opacity:0}}
@keyframes critburst{0%{transform:scale(0);opacity:1}40%{transform:scale(1.3);opacity:.9}100%{transform:scale(2.5);opacity:0}}
.dval{font-family:'Cinzel',serif;font-size:.82rem;font-weight:600;text-align:center;min-height:1.1em}
.dval.crit{color:var(--yel)}
.dval.fail{color:var(--red)}
.dval.norm{color:var(--txt)}

/* ——— total ——— */
.total-box{
  background:var(--s1);border:1px solid var(--brd);border-radius:8px;
  padding:1.25rem;text-align:center;
}
.total-lbl{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.28em;text-transform:uppercase;color:var(--txd);margin-bottom:.4rem}
.total-num{
  font-family:'Cinzel',serif;font-size:clamp(3rem,10vw,5rem);font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.total-num.crit-style{background:linear-gradient(135deg,#fbbf24,#f59e0b,#fbbf24);-webkit-background-clip:text;background-clip:text;animation:cglow 1s ease-in-out infinite alternate}
@keyframes cglow{from{-webkit-text-fill-color:rgba(251,191,36,.9)}to{-webkit-text-fill-color:rgba(251,191,36,1)}}
.total-brkd{margin-top:.6rem;color:var(--txd);font-size:.88rem}
.total-mod{color:var(--purp2);font-weight:600}
.crit-msg{
  display:inline-block;margin-top:.6rem;font-family:'Cinzel',serif;font-size:.82rem;
  letter-spacing:.14em;text-transform:uppercase;padding:.28rem .9rem;border-radius:3px;
  animation:msgpop .4s ease-out;
}
@keyframes msgpop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.crit-msg.crit{color:var(--yel);border:1px solid rgba(251,191,36,.4);background:rgba(251,191,36,.08)}
.crit-msg.fail{color:var(--red);border:1px solid rgba(220,38,38,.4);background:rgba(220,38,38,.08)}
.rand-badge{margin-top:.5rem;font-size:.68rem;color:var(--txm);font-style:italic;display:flex;align-items:center;justify-content:center;gap:.35rem}

/* ——— 3D dice ——— */
.dice-stage{position:relative;width:100%;min-height:280px;margin-bottom:1.25rem}
.dice-3d-container{position:absolute;inset:0;display:none;align-items:center;justify-content:center}
.dice-3d-container canvas{width:100%;height:100%;border-radius:8px}
.result-area{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center}

/* ——— room / live ——— */
.room-panel{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:1.1rem;margin-bottom:1.25rem}
.room-row{display:flex;gap:.6rem;align-items:flex-end;flex-wrap:wrap}
.room-field{display:flex;flex-direction:column;gap:.3rem}
.room-field label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--txd)}
.room-input{background:var(--s2);border:1px solid var(--brd2);color:var(--txt);font-family:Georgia,serif;font-size:.9rem;padding:.5rem .7rem;border-radius:5px;outline:none;width:140px}
.room-input:focus{border-color:var(--gold)}
.room-input.wide{width:200px}
.room-btn{background:var(--purp);color:#fff;border:none;border-radius:5px;padding:.55rem 1.2rem;font-family:'Cinzel',serif;font-size:.82rem;cursor:pointer;transition:all .18s;letter-spacing:.06em}
.room-btn:hover{background:var(--purp2)}
.room-btn:disabled{opacity:.4;cursor:not-allowed}
.room-status{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
.room-badge{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.1em;color:var(--gold);background:rgba(201,162,39,.1);border:1px solid rgba(201,162,39,.3);padding:.3rem .8rem;border-radius:4px}
.room-leave{background:none;border:1px solid var(--brd2);color:var(--txd);font-size:.72rem;padding:.25rem .6rem;border-radius:3px;cursor:pointer;transition:all .18s}
.room-leave:hover{border-color:var(--red);color:var(--red)}
.live-feed{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:1.1rem;margin-bottom:1.25rem;max-height:320px;overflow-y:auto}
.live-feed:empty{display:none}
.live-title{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--txd);margin-bottom:.7rem}
.live-item{display:flex;align-items:center;gap:.7rem;padding:.5rem .7rem;background:var(--s2);border:1px solid var(--brd);border-radius:5px;margin-bottom:.4rem;animation:liveIn .3s ease-out}
@keyframes liveIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.live-player{font-family:'Cinzel',serif;font-size:.78rem;color:var(--purp2);min-width:80px;flex-shrink:0}
.live-expr{font-size:.78rem;color:var(--txd);flex-shrink:0}
.live-rolls{font-size:.72rem;color:var(--txm);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.live-tot{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--gold);min-width:2.5em;text-align:right;flex-shrink:0}
.live-tot.crit{color:var(--yel)}
.live-tot.fail{color:var(--red)}
.live-time{font-size:.65rem;color:var(--txm);flex-shrink:0}
.live-self{border-color:rgba(168,85,247,.3);background:rgba(168,85,247,.05)}
.live-empty{text-align:center;color:var(--txm);font-style:italic;font-size:.82rem;padding:.8rem 0}

/* ——— responsive ——— */
@media(max-width:580px){
  header{padding:1.75rem 0 1.25rem}
  .dgrid{grid-template-columns:repeat(4,1fr)}
  .roll-btn{padding:.8rem 1.8rem;font-size:.95rem}
  .dsvg-wrap,.dsvg-wrap svg{width:64px;height:64px}
}
</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.min.js",
  "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
} }
</script>

<body>
<div class="stars"></div>
<div class="wrap">

<header>
  <span class="rune">⚔️</span>
  <h1>Dice Forge</h1>
  <p class="subtitle">Lanceur de Dés pour Jeux de Rôle</p>
  <div class="hdiv"><span class="hdiv-icon">✦</span></div>
</header>

<div class="settings">
  <div class="tog-wrap" onclick="toggleSetting('anim')">
    <div class="tog on" id="tog-anim"></div>
    <span class="tog-lbl">Animations</span>
  </div>
  <div class="tog-wrap" onclick="toggleSetting('sound')">
    <div class="tog on" id="tog-sound"></div>
    <span class="tog-lbl">Son MP3</span>
  </div>
</div>

<div class="room-panel" id="room-panel">
  <div id="room-join">
    <div class="room-row">
      <div class="room-field">
        <label>Nom du joueur</label>
        <input class="room-input wide" id="player-name" placeholder="Gandalf" maxlength="20">
      </div>
      <div class="room-field">
        <label>Code de la partie</label>

<script type="module">
import { createClient } from '@supabase/supabase-js';

// ▼▼▼ Config chargée depuis supabase-config.js (gitignored) ▼▼▼
const SUPABASE_URL = (window.SUPABASE_CONFIG && window.SUPABASE_CONFIG.url) || 'https://VOTRE_PROJET.supabase.co';
const SUPABASE_ANON_KEY = (window.SUPABASE_CONFIG && window.SUPABASE_CONFIG.anonKey) || 'VOTRE_CLE_ANON';
// ▲▲▲ ▲▲▲

let sb = null;
let roomState = { code: null, player: null, connected: false };
let liveSub = null;

function sbInit() {
  if (sb) return;
  if (SUPABASE_URL.includes('VOTRE_PROJET')) {
    console.warn('Supabase: configure SUPABASE_URL et SUPABASE_ANON_KEY');
    return;
  }
  sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for (let i = 0; i < 4; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

window.joinRoom = async function() {
  const name = document.getElementById('player-name').value.trim();
  const code = document.getElementById('room-code').value.trim().toUpperCase();
  if (!name) { alert('Entre ton nom de joueur'); return; }
  if (!code) { alert('Entre le code de la partie'); return; }
  sbInit();
  if (!sb) { alert('Supabase non configuré. Voir instructions.'); return; }

  const { data, error } = await sb.from('rolls')
    .select('id')
    .eq('room_code', code)
    .limit(1);
  if (error) { alert('Erreur: ' + error.message); return; }
  if (!data.length) { alert('Aucune partie trouvée avec ce code'); return; }

  roomState = { code, player: name, connected: true };
  localStorage.setItem('diceforge_room', JSON.stringify(roomState));
  showConnected();
  subscribeLive(code, name);
  await loadRecent(code, name);
};

window.createRoom = async function() {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { alert('Entre ton nom de joueur'); return; }
  sbInit();
  if (!sb) { alert('Supabase non configuré. Voir instructions.'); return; }

  const code = genCode();
  const { error } = await sb.from('rolls').insert({
    room_code: code,
    player_name: name,
    expression: '— Partie créée —',
    rolls_detail: '',
    total: 0,
    is_crit: false,
    is_fail: false
  });
  if (error) { alert('Erreur: ' + error.message); return; }

  roomState = { code, player: name, connected: true };
  localStorage.setItem('diceforge_room', JSON.stringify(roomState));
  document.getElementById('room-code').value = code;
  showConnected();
  subscribeLive(code, name);
  await loadRecent(code, name);
};

window.leaveRoom = function() {
  if (liveSub) { liveSub.unsubscribe(); liveSub = null; }
  roomState = { code: null, player: null, connected: false };
  localStorage.removeItem('diceforge_room');
  document.getElementById('room-join').style.display = '';
  document.getElementById('room-connected').style.display = 'none';
  document.getElementById('live-feed').style.display = 'none';
  document.getElementById('live-list').innerHTML = '';
};

function showConnected() {
  document.getElementById('room-join').style.display = 'none';
  document.getElementById('room-connected').style.display = '';
  document.getElementById('room-badge-text').textContent = 'Room: ' + roomState.code;
  document.getElementById('player-badge-text').textContent = 'Joueur: ' + roomState.player;
  document.getElementById('live-feed').style.display = '';
}

function subscribeLive(code, selfName) {
  if (liveSub) liveSub.unsubscribe();
  liveSub = sb.channel('rolls:' + code)
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'rolls', filter: 'room_code=eq.' + code },
      (payload) => {
        const r = payload.new;
        if (r.expression === '— Partie créée —') return;
        addLiveItem(r, r.player_name === selfName);
      }
    )
    .subscribe();
}

async function loadRecent(code, selfName) {
  const { data } = await sb.from('rolls')
    .select('*')
    .eq('room_code', code)
    .neq('expression', '— Partie créée —')
    .order('created_at', { ascending: false })
    .limit(20);
  if (!data) return;
  const list = document.getElementById('live-list');
  list.innerHTML = '';
  data.reverse().forEach(r => addLiveItem(r, r.player_name === selfName, true));
}

function addLiveItem(r, isSelf, prepend) {
  const list = document.getElementById('live-list');
  if (!list.children.length) list.innerHTML = '';
  const cls = isSelf ? 'live-self' : '';
  const tCls = r.is_crit ? 'crit' : r.is_fail ? 'fail' : '';
  const time = new Date(r.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  const html = `<div class="live-item ${cls}">
    <span class="live-player">${esc(r.player_name)}</span>
    <span class="live-expr">${esc(r.expression)}</span>
    <span class="live-rolls">${esc(r.rolls_detail)}</span>
    <span class="live-tot ${tCls}">${r.total}${r.is_crit ? ' ★' : r.is_fail ? ' ✗' : ''}</span>
    <span class="live-time">${time}</span>
  </div>`;
  if (prepend || !list.children.length) {
    list.insertAdjacentHTML('afterbegin', html);
  } else {
    list.insertAdjacentHTML('beforeend', html);
  }
  list.parentElement.scrollTop = 0;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

window.sendRoll = async function(expr, rollsDetail, total, isCrit, isFail) {
  if (!roomState.connected || !sb) return;
  await sb.from('rolls').insert({
    room_code: roomState.code,
    player_name: roomState.player,
    expression: expr,
    rolls_detail: rollsDetail,
    total: total,
    is_crit: isCrit,
    is_fail: isFail
  });
};

// auto-restore session
(function() {
  const saved = localStorage.getItem('diceforge_room');
  if (saved) {
    try {
      const r = JSON.parse(saved);
      if (r.code && r.player) {
        roomState = { code: r.code, player: r.player, connected: true };
        document.getElementById('player-name').value = r.player;
        document.getElementById('room-code').value = r.code;
        sbInit();
        if (sb) {
          showConnected();
          subscribeLive(r.code, r.player);
          loadRecent(r.code, r.player);
        }
      }
    } catch(e) {}
  }
})();
</script>

<script type="module">
import * as THREE from 'three';

window.D3D = (function(){
  let scene,cam,rend,canvas,container;
  let dice=[]; let rafId=null; let onDone=null; let ready=false;

  function init(){
    if(ready)return; ready=true;
    container=document.getElementById('dice-3d-container');
    canvas=document.getElementById('dice-3d-canvas');
    scene=new THREE.Scene();
    cam=new THREE.PerspectiveCamera(40,2,0.1,100);
    cam.position.set(0,7,11); cam.lookAt(0,0,0);
    rend=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
    rend.setPixelRatio(Math.min(window.devicePixelRatio,2));
    scene.add(new THREE.AmbientLight(0x555577,0.7));
    const d1=new THREE.DirectionalLight(0xffffff,1.0); d1.position.set(5,12,8); scene.add(d1);
    const d2=new THREE.DirectionalLight(0xa855f7,0.5); d2.position.set(-6,4,-5); scene.add(d2);
    const d3=new THREE.DirectionalLight(0xc9a227,0.3); d3.position.set(0,-5,5); scene.add(d3);
  }

  function faceTex(num,type){
    const c=document.createElement('canvas'); c.width=c.height=256;
    const x=c.getContext('2d');
    x.fillStyle='#0d0d28'; x.fillRect(0,0,256,256);
    const g=x.createRadialGradient(90,70,10,128,128,200);
    g.addColorStop(0,'rgba(255,255,255,0.12)'); g.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g; x.fillRect(0,0,256,256);
    x.strokeStyle='rgba(201,162,39,0.25)'; x.lineWidth=3; x.strokeRect(10,10,236,236);
    const dn=type===100&&num===100?'00':type===100&&num<10?'0'+num:''+num;
    const fs=dn.length>=3?80:dn.length>=2?110:130;
    x.font=`bold ${fs}px Cinzel,serif`; x.textAlign='center'; x.textBaseline='middle';
    x.fillStyle='#ede0c8'; x.fillText(dn,128,140);
    const t=new THREE.CanvasTexture(c); t.anisotropy=4; return t;
  }

  function trapezo(n=5){
    const g=new THREE.BufferGeometry();
    const pos=[[0,1.3,0]];
    for(let i=0;i<n;i++){const a=i/n*Math.PI*2;pos.push([Math.cos(a)*.85,.35,Math.sin(a)*.85]);}
    for(let i=0;i<n;i++){const a=(i+.5)/n*Math.PI*2;pos.push([Math.cos(a)*.85,-.35,Math.sin(a)*.85]);}
    pos.push([0,-1.3,0]);
    const idx=[];
    for(let i=0;i<n;i++){
      const ui=1+i,ui2=1+(i+1)%n,li=1+n+i,li2=1+n+(i+1)%n;
      idx.push(0,li,ui, 0,ui2,li);
      idx.push(2*n+1,li,ui2, 2*n+1,ui2,li2);
      g.addGroup(i*12,6,i);
      g.addGroup(i*12+6,6,n+i);
    }
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos.flat(),3));
    g.setIndex(idx); g.computeVertexNormals(); return g;
  }

  function makeGeo(type){
    const r=1;
    if(type===4)return new THREE.TetrahedronGeometry(r*1.2,0);
    if(type===6)return new THREE.BoxGeometry(r*1.5,r*1.5,r*1.5);
    if(type===8)return new THREE.OctahedronGeometry(r*1.1,0);
    if(type===10||type===100)return trapezo(5);
    if(type===12)return new THREE.DodecahedronGeometry(r,0);
    if(type===20)return new THREE.IcosahedronGeometry(r,0);
    return new THREE.BoxGeometry(r,r,r);
  }

  function faceInfo(geo){
    const pos=geo.attributes.position, faces=[];
    if(geo.index&&geo.groups.length){
      const ind=geo.index;
      for(const g of geo.groups){
        const a=ind.getX(g.start),b=ind.getX(g.start+1),c=ind.getX(g.start+2);
        const va=new THREE.Vector3().fromBufferAttribute(pos,a);
        const vb=new THREE.Vector3().fromBufferAttribute(pos,b);
        const vc=new THREE.Vector3().fromBufferAttribute(pos,c);
        const n=new THREE.Vector3().subVectors(vb,va).cross(new THREE.Vector3().subVectors(vc,va)).normalize();
        faces.push({normal:n,matIdx:g.materialIndex});
      }
    } else {
      const triCount=Math.floor(pos.count/3);
      for(let i=0;i<triCount;i++){
        const va=new THREE.Vector3().fromBufferAttribute(pos,i*3);
        const vb=new THREE.Vector3().fromBufferAttribute(pos,i*3+1);
        const vc=new THREE.Vector3().fromBufferAttribute(pos,i*3+2);
        const n=new THREE.Vector3().subVectors(vb,va).cross(new THREE.Vector3().subVectors(vc,va)).normalize();
        faces.push({normal:n,matIdx:i});
        geo.addGroup(i*3,3,i);
      }
    }
    return faces;
  }

  function makeDie(type){
    const geo=makeGeo(type), fi=faceInfo(geo), nF=fi.length, mats=[], vals=[];
    for(let i=0;i<nF;i++){
      const v=i+1; vals.push(v);
      mats.push(new THREE.MeshStandardMaterial({
        map:faceTex(v,type),color:0x1a1a3f,metalness:0.35,roughness:0.45,flatShading:true
      }));
    }
    const m=new THREE.Mesh(geo,mats);
    m.userData={type,faceInfo:fi,faceVals:vals};
    return m;
  }

  function targetQuat(die,value){
    const {faceInfo,faceVals}=die.userData;
    const idx=faceVals.indexOf(value);
    if(idx<0)return new THREE.Quaternion();
    const fn=faceInfo[idx].normal.clone();
    const camDir=new THREE.Vector3(0,0.8,0.6).normalize();
    const q=new THREE.Quaternion().setFromUnitVectors(fn,camDir);
    q.multiply(new THREE.Quaternion().setFromAxisAngle(camDir,(Math.random()-0.5)*0.6));
    return q;
  }

  function roll(groups,duration,callback){
    init();
    dice.forEach(d=>{scene.remove(d);d.geometry.dispose();
      if(Array.isArray(d.material))d.material.forEach(m=>{if(m.map)m.map.dispose();m.dispose();});});
    dice=[]; onDone=callback;
    let count=0; groups.forEach(g=>count+=g.rolls.length);
    const sp=Math.min(2.8,18/Math.max(count,1));
    let di=0;
    groups.forEach(g=>{
      g.rolls.forEach(r=>{
        const m=makeDie(g.type);
        m.position.set((di-(count-1)/2)*sp,0,0);
        m.rotation.set(Math.random()*Math.PI*2,Math.random()*Math.PI*2,Math.random()*Math.PI*2);
        m.userData.avel=new THREE.Vector3((Math.random()-0.5)*25,(Math.random()-0.5)*25,(Math.random()-0.5)*25);
        m.userData.targetVal=r.finalVal!==undefined?r.finalVal:r.val;
        m.userData.sQ=null; m.userData.tQ=null;
        scene.add(m); dice.push(m); di++;
      });
    });
    const width=Math.max(count*sp+2,8);
    cam.position.set(0,7,Math.max(11,width*0.9)); cam.lookAt(0,0,0);
    container.style.display='flex';
    const w=container.clientWidth||600, h=container.clientHeight||280;
    rend.setSize(w,h,false); cam.aspect=w/h; cam.updateProjectionMatrix();
    const start=performance.now();
    loop(start,duration);
  }

  function loop(start,dur){
    const el=performance.now()-start, t=Math.min(el/dur,1);
    if(t>=1){
      dice.forEach(d=>{d.position.y=0;});
      rend.render(scene,cam);
      rafId=null; if(onDone){const cb=onDone;onDone=null;cb();} return;
    }
    rafId=requestAnimationFrame(()=>loop(start,dur));
    if(t<0.7){
      const decay=1-Math.pow(t/0.7,1.5);
      dice.forEach(d=>{
        const av=d.userData.avel;
        d.rotation.x+=av.x*0.016*decay;
        d.rotation.y+=av.y*0.016*decay;
        d.rotation.z+=av.z*0.016*decay;
        d.position.y=Math.abs(Math.sin(el*0.008+d.id))*0.6*decay;
      });
    } else if(t<1){
      const st=(t-0.7)/0.3, ease=1-Math.pow(1-st,3);
      dice.forEach(d=>{
        if(!d.userData.tQ){
          d.userData.sQ=d.quaternion.clone();
          d.userData.tQ=targetQuat(d,d.userData.targetVal);
        }
        d.quaternion.slerpQuaternions(d.userData.sQ,d.userData.tQ,ease);
        d.position.y*=(1-ease);
      });
    }
    rend.render(scene,cam);
  }

  function hide(){ if(container)container.style.display='none'; }
  function dispose(){
    if(rafId)cancelAnimationFrame(rafId);
    dice.forEach(d=>{scene.remove(d);d.geometry.dispose();
      if(Array.isArray(d.material))d.material.forEach(m=>{if(m.map)m.map.dispose();m.dispose();});});
    dice=[];
  }
  window.addEventListener('resize',()=>{
    if(!ready||!container||container.style.display==='none')return;
    const w=container.clientWidth,h=container.clientHeight;
    rend.setSize(w,h,false); cam.aspect=w/h; cam.updateProjectionMatrix();
  });

  return {roll,hide,dispose,get ready(){return ready;}};
})();
</script>

}
function sndFail(){
  if(!cfg.sound)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const gn=ctx.createGain();gn.gain.setValueAtTime(.1,ctx.currentTime);gn.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.6);
    gn.connect(ctx.destination);
    [300,250,200].forEach((f,i)=>{
      const o=ctx.createOscillator();o.type='sawtooth';o.frequency.value=f;
      o.connect(gn);o.start(ctx.currentTime+i*.1);o.stop(ctx.currentTime+.6);
    });
  }catch(e){}
}

// ——— SVG generation ———
let svgIdCt=0;
function shadeFill(shade,state){
  let r,g,b;
  if(state==='s-crit'){r=Math.round(25+shade*35);g=Math.round(18+shade*28);b=Math.round(8+shade*15);}
  else if(state==='s-fail'){r=Math.round(28+shade*30);g=Math.round(10+shade*12);b=Math.round(12+shade*18);}
  else if(state==='rolling'){r=Math.round(15+shade*18);g=Math.round(10+shade*14);b=Math.round(35+shade*50);}
  else{r=Math.round(10+shade*20);g=Math.round(10+shade*20);b=Math.round(35+shade*55);}
  return `rgb(${r},${g},${b})`;
}
function makeSVG(type,val,state,size){
  const s=SHAPES[type];
  let stroke=s.stroke;
  if(state==='rolling')stroke='#a855f7';
  if(state==='s-crit')stroke='#fbbf24';
  if(state==='s-fail')stroke='#dc2626';
  const gid='dg'+(++svgIdCt);

  let faces='';
  s.faces.forEach(f=>{
    faces+=`<polygon points="${f.pts}" fill="${shadeFill(f.shade,state)}" stroke="${stroke}" stroke-width="1.2" stroke-linejoin="round"/>`;
  });

  let edges='';
  (s.edges||[]).forEach(e=>{
    const p=e.match(/\d+/g);
    edges+=`<line x1="${p[0]}" y1="${p[1]}" x2="${p[2]}" y2="${p[3]}" stroke="${stroke}" stroke-width=".8" opacity=".35"/>`;
  });

  let outline='';
  if(s.outline)
    outline=`<polygon points="${s.outline}" fill="none" stroke="${stroke}" stroke-width="2.5" stroke-linejoin="round"/>`;

  const dispVal=val===null?'':(type===100&&val===100?'00':type===100&&val<10?'0'+val:val);
  const fs=String(dispVal).length>=3?18:String(dispVal).length>=2?24:28;
  let tc='#ede0c8';
  if(state==='s-crit')tc='#fbbf24';
  if(state==='s-fail')tc='#ef4444';
  if(state==='rolling')tc='#c084fc';
  const c=s.center||{x:50,y:54};

  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="${gid}" cx="36%" cy="20%" r="58%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient></defs>
    ${faces}${edges}${outline}
    <rect x="0" y="0" width="100" height="100" fill="url(#${gid})" pointer-events="none"/>
    <text x="${c.x}" y="${c.y}" text-anchor="middle" dominant-baseline="middle"
      font-family="Cinzel,serif" font-size="${fs}" font-weight="700"
      fill="${tc}">${dispVal}</text>
  </svg>`;
}

// ——— dice grid ———
function renderGrid(){
  const el=document.getElementById('dgrid');
  el.innerHTML=DTYPES.map(t=>`
    <div class="dsel${expr[t]>0?' active':''}" id="dsel-${t}">
      <div style="height:46px;display:flex;align-items:center;justify-content:center;">
        ${makeSVG(t,null,'idle').replace('viewBox="0 0 100 100"','viewBox="0 0 100 100" width="42" height="42"')}
      </div>
      <div class="dname">D${t}</div>
      <div class="dcount">
        <button class="cbtn" onclick="chg(${t},-1)">−</button>
        <span class="cval" id="cv-${t}">${expr[t]}</span>
        <button class="cbtn" onclick="chg(${t},1)">+</button>
      </div>
    </div>`).join('');
}

function renderExBar(){
  const bar=document.getElementById('exbar');
  const mod=parseInt(document.getElementById('mod-input').value)||0;
  const parts=DTYPES.filter(t=>expr[t]>0);
  if(parts.length===0){
    bar.innerHTML='<span class="exempty">Sélectionnez des dés ci-dessus…</span>';
    document.getElementById('roll-btn').disabled=true;
    return;
  }
  document.getElementById('roll-btn').disabled=false;
  let html=parts.map((t,i)=>`${i>0?'<span class="explus">+</span>':''}<span class="extok">${expr[t]}D${t}</span>`).join('');
  if(mod!==0)html+=`<span class="explus">${mod>=0?'+':''}</span><span class="extok" style="color:var(--purp2);border-color:rgba(168,85,247,.3);background:rgba(168,85,247,.08)">${mod}</span>`;
  html+=`<button class="exclear" onclick="clearExpr()">✕ Effacer</button>`;
  bar.innerHTML=html;
}

// ——— controls ———
function chg(type,delta){
  if(rolling)return;
  expr[type]=Math.max(0,Math.min(10,expr[type]+delta));
  renderGrid();renderExBar();
}
function clearExpr(){
  if(rolling)return;
  DTYPES.forEach(t=>expr[t]=0);
  document.getElementById('mod-input').value=0;
  renderGrid();renderExBar();
  results=null;renderResult();
}
function toggleSetting(k){
  cfg[k]=!cfg[k];
  document.getElementById('tog-'+k).classList.toggle('on',cfg[k]);
}

// ——— roll ———
function buildGroups(){
  return DTYPES.filter(t=>expr[t]>0).map(t=>({
    type:t,
    rolls:Array.from({length:expr[t]},()=>({val:null,state:'rolling'}))
  }));
}

function rollAll(){
  if(rolling)return;
  const groups=buildGroups();
  if(!groups.length)return;
  const mod=parseInt(document.getElementById('mod-input').value)||0;

  rolling=true;
  results={groups,total:null,mod};
  document.getElementById('roll-btn').classList.add('rolling');
  document.getElementById('roll-btn').disabled=true;
  disableQuick(true);

  sndRoll();

  const dur=cfg.anim?1800:0;

  if(cfg.anim&&window.D3D){
    groups.forEach(g=>g.rolls.forEach(r=>{r.val=rnd(1,g.type);r.state='rolling';}));
    groups.forEach(g=>g.rolls.forEach(r=>{r.finalVal=rnd(1,g.type);}));
    document.getElementById('result-area').style.visibility='hidden';
    renderResult();
    window.D3D.roll(groups,dur,()=>finalize(groups,mod));
  } else {
    finalize(groups,mod);
  }
}

function finalize(groups,mod){
  groups.forEach(g=>{
    g.rolls.forEach(r=>{
      r.val=r.finalVal!==undefined?r.finalVal:rnd(1,g.type);
      const ratio=r.val/g.type;
      if(g.type===20&&r.val===20)r.state='s-crit';
      else if(g.type===20&&r.val===1)r.state='s-fail';
      else if(ratio>=.85)r.state='s-high';
      else if(ratio<=.15)r.state='s-low';
      else r.state='s-norm';
    });
  });
  const rawTotal=groups.reduce((s,g)=>s+g.rolls.reduce((ss,r)=>ss+r.val,0),0);
  const total=rawTotal+mod;
  const hasCrit=groups.some(g=>g.type===20&&g.rolls.some(r=>r.val===20));
  const hasFail=groups.some(g=>g.type===20&&g.rolls.some(r=>r.val===1));
  if(hasCrit)sndCrit();
  else if(hasFail)sndFail();

  results={groups,total,rawTotal,mod};
  rolling=false;
  document.getElementById('roll-btn').classList.remove('rolling');
  document.getElementById('roll-btn').disabled=false;
  disableQuick(false);
  document.getElementById('result-area').style.visibility='';
  renderResult();
  if(window.D3D)window.D3D.hide();

  const exprStr=groups.map(g=>`${g.rolls.length}D${g.type}`).join(' + ')+(mod!==0?(mod>=0?` + ${mod}`:` − ${Math.abs(mod)}`): '');
  const rollsStr=groups.map(g=>`[${g.rolls.map(r=>r.val).join(', ')}]`).join(' ');
  if(window.sendRoll)window.sendRoll(exprStr,rollsStr,total,hasCrit,hasFail);
}

function disableQuick(disabled){
  document.querySelectorAll('.qbtn').forEach(b=>b.disabled=disabled);
}

// ——— render result ———
function renderResult(){
  const el=document.getElementById('result-area');
  if(!results){el.innerHTML='';return;}
  const {groups,total,rawTotal,mod}=results;

  let html='<div class="dice-display">';
  groups.forEach((g,gi)=>{
    if(gi>0)html+='<span class="gplus">+</span>';
    html+='<div class="dgroup">';
    g.rolls.forEach((r,ri)=>{
      const cls=cfg.anim?r.state:'';
      const vc=r.state==='s-crit'?'crit':r.state==='s-fail'?'fail':'norm';
      html+=`<div class="die-item">
        <div class="dsvg-wrap ${cls}" style="--d:${(ri*0.08).toFixed(2)}s">
          ${makeSVG(g.type,r.val,r.state)}
        </div>
        <div class="dval ${vc}">${r.val!==null?r.val:''}</div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';

  if(total!==null){
    const hasCrit=groups.length===1&&groups[0].type===20&&groups[0].rolls.some(r=>r.val===20);
    const hasFail=groups.length===1&&groups[0].type===20&&groups[0].rolls.some(r=>r.val===1);
    const multiDice=groups.reduce((s,g)=>s+g.rolls.length,0)>1||mod!==0;

    let brkd='';
    if(multiDice){
      const parts=groups.map(g=>g.rolls.map(r=>r.val).join(' + ')).join(' + ');
      const modStr=mod!==0?(mod>=0?` <span class="total-mod">+ ${mod}</span>`:` <span class="total-mod">− ${Math.abs(mod)}</span>`):'';
      brkd=`<div class="total-brkd">${parts}${modStr} = ${total}</div>`;
    }
    const critMsg=hasCrit?'<div class="crit-msg crit">⭐ Coup Critique !</div>':hasFail?'<div class="crit-msg fail">💀 Échec Critique !</div>':'';

    html+=`<div class="total-box">
      <div class="total-lbl">Résultat Total</div>
      <div class="total-num${hasCrit?' crit-style':''}">${total}</div>
      ${brkd}${critMsg}
      <div class="rand-badge">🔒 Généré via crypto.getRandomValues()</div>
    </div>`;
  }

  el.innerHTML=html;
}

// ——— quick roll ———
function quickRoll(type){
  if(rolling)return;
  DTYPES.forEach(t=>expr[t]=0);
  expr[type]=1;
  document.getElementById('mod-input').value=0;
  renderGrid();renderExBar();rollAll();
}
function quickMulti(list){
  if(rolling)return;
  DTYPES.forEach(t=>expr[t]=0);
  list.forEach(({t,n})=>expr[t]=n);
  document.getElementById('mod-input').value=0;
  renderGrid();renderExBar();rollAll();
}

// ——— init ———
renderGrid();
renderExBar();
</script>
</body>
</html>
